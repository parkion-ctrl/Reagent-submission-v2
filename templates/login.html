<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | 시약 관리 시스템</title>
    <link rel="stylesheet" href="/static/bootstrap.min.css">
    <style>
        :root {
            --bg-1: #0f172a;
            --bg-2: #1e293b;
            --card: rgba(255, 255, 255, 0.92);
            --accent: #2563eb;
        }
        body {
            min-height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(59, 130, 246, 0.32), transparent 35%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.25), transparent 30%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: #0f172a;
            display: grid;
            place-items: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 배경 장식 SVG */
        .deco {
            position: fixed;
            pointer-events: none;
            opacity: 0.07;
        }
        .deco-tl { top: 20px; left: 30px; width: 320px; }
        .deco-dropper { top: 20px; left: 380px; width: 80px; opacity: 0.07; transform: rotate(30deg); transform-origin: center top; }
        .deco-br { bottom: -60px; right: -40px; width: 380px; transform: rotate(20deg); }
        .deco-tr { top: 30px; right: 20px; width: 380px; opacity: 0.07; }
        .deco-bl { bottom: 30px; left: -10px; width: 160px; opacity: 0.05; transform: rotate(10deg); }
        .nh4-mol { position: fixed; left: 200px; bottom: 80px; width: 320px; opacity: 0.18; pointer-events: none; transform: rotate(-30deg); }
        .h2o-mol { position: fixed; right: calc(50% - 600px); top: 50%; transform: translateY(-50%) rotate(30deg); width: 320px; opacity: 0.18; pointer-events: none; }

        .login-shell { width: 100%; max-width: 420px; position: relative; z-index: 1; }
        .login-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.35);
            overflow: hidden;
            backdrop-filter: blur(16px);
        }
        .login-hero {
            padding: 28px 28px 18px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.12), rgba(14, 165, 233, 0.08));
        }
        .brand { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 18px; font-weight: 700; }
        .brand-badge {
            width: 42px; height: 42px; border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            color: #fff; display: grid; place-items: center;
            font-size: 1.1rem; box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
        }
        .login-body { padding: 28px; }
        .form-label { font-weight: 600; }
        .btn-login {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border: none;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.25);
        }
        .btn-login:hover { background: linear-gradient(135deg, #1d4ed8, #1e40af); }
        .login-note { color: #64748b; font-size: 0.92rem; }
    </style>
</head>
<body>

    <!-- 좌상단: 삼각 플라스크 -->
    <svg class="deco deco-tl" viewBox="0 0 300 340" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="118" y="10" width="44" height="80" rx="6" fill="white"/>
        <path d="M118 90 L30 290 Q28 310 50 310 L250 310 Q272 310 270 290 L162 90 Z" fill="white"/>
        <path d="M52 240 L30 290 Q28 310 50 310 L250 310 Q272 310 270 290 L243 240 Z" fill="#1e3a5f" opacity="0.8"/>
        <circle cx="130" cy="260" r="12" fill="white" opacity="0.3"/>
        <circle cx="165" cy="245" r="8" fill="white" opacity="0.3"/>
        <circle cx="195" cy="268" r="10" fill="white" opacity="0.3"/>
        <line x1="80" y1="210" x2="105" y2="210" stroke="white" stroke-width="4" opacity="0.5"/>
        <line x1="68" y1="250" x2="95" y2="250" stroke="white" stroke-width="4" opacity="0.5"/>
        <rect x="110" y="2" width="60" height="16" rx="4" fill="white" opacity="0.6"/>
    </svg>

    <!-- 우하단: 시험관 2개 -->
    <svg class="deco deco-br" viewBox="0 0 360 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(-25, 100, 200)">
            <rect x="70" y="40" width="52" height="220" rx="26" fill="white"/>
            <rect x="70" y="170" width="52" height="90" rx="0" fill="white" opacity="0.35"/>
            <ellipse cx="96" cy="260" rx="26" ry="26" fill="white" opacity="0.35"/>
            <line x1="72" y1="140" x2="88" y2="140" stroke="white" stroke-width="3" opacity="0.5"/>
            <line x1="72" y1="170" x2="88" y2="170" stroke="white" stroke-width="3" opacity="0.5"/>
            <line x1="72" y1="200" x2="88" y2="200" stroke="white" stroke-width="3" opacity="0.5"/>
            <rect x="64" y="28" width="64" height="20" rx="5" fill="white" opacity="0.6"/>
        </g>
        <g transform="rotate(10, 240, 180)">
            <rect x="210" y="20" width="44" height="200" rx="22" fill="white"/>
            <rect x="210" y="130" width="44" height="70" rx="0" fill="white" opacity="0.35"/>
            <ellipse cx="232" cy="220" rx="22" ry="22" fill="white" opacity="0.35"/>
            <line x1="212" y1="110" x2="224" y2="110" stroke="white" stroke-width="3" opacity="0.5"/>
            <line x1="212" y1="140" x2="224" y2="140" stroke="white" stroke-width="3" opacity="0.5"/>
            <rect x="204" y="10" width="56" height="18" rx="4" fill="white" opacity="0.6"/>
        </g>
    </svg>

    <!-- 플라스크 옆: 스포이드 -->
    <svg class="deco deco-dropper" viewBox="0 0 80 320" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="40" cy="38" rx="28" ry="36" fill="white"/>
        <path d="M28 68 Q40 82 52 68 L52 68 L28 68 Z" fill="white"/>
        <rect x="33" y="75" width="14" height="170" rx="7" fill="white"/>
        <line x1="34" y1="110" x2="42" y2="110" stroke="white" stroke-width="2.5" opacity="0.5"/>
        <line x1="34" y1="140" x2="42" y2="140" stroke="white" stroke-width="2.5" opacity="0.5"/>
        <line x1="34" y1="170" x2="42" y2="170" stroke="white" stroke-width="2.5" opacity="0.5"/>
        <line x1="34" y1="200" x2="42" y2="200" stroke="white" stroke-width="2.5" opacity="0.5"/>
        <rect x="33" y="190" width="14" height="55" rx="0" fill="white" opacity="0.35"/>
        <path d="M33 245 Q40 285 47 245 Z" fill="white"/>
        <path d="M37 292 Q40 310 43 292 Q43 282 40 278 Q37 282 37 292 Z" fill="white" opacity="0.7"/>
    </svg>

    <!-- 우상단: Cobas 분석기 -->
    <svg class="deco deco-tr" viewBox="0 0 260 200" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="white" stroke-linecap="round" stroke-linejoin="round">
        <rect x="10" y="20" width="240" height="160" rx="12" fill="white" fill-opacity="0.08" stroke-width="3"/>
        <line x1="10" y1="50" x2="250" y2="50" stroke-width="2"/>
        <line x1="95" y1="50" x2="95" y2="180" stroke-width="2"/>
        <line x1="170" y1="50" x2="170" y2="180" stroke-width="2"/>
        <rect x="20" y="60" width="65" height="100" rx="5" fill="white" fill-opacity="0.1" stroke-width="1.5"/>
        <g stroke-width="1.5" opacity="0.6">
            <line x1="25" y1="76"  x2="80" y2="76"/>
            <line x1="25" y1="92"  x2="80" y2="92"/>
            <line x1="25" y1="108" x2="80" y2="108"/>
            <line x1="25" y1="124" x2="80" y2="124"/>
            <line x1="25" y1="140" x2="80" y2="140"/>
        </g>
        <g fill="white" fill-opacity="0.5" stroke="none">
            <rect x="28" y="62" width="10" height="13" rx="3"/>
            <rect x="42" y="62" width="10" height="13" rx="3"/>
            <rect x="56" y="62" width="10" height="13" rx="3"/>
            <rect x="70" y="62" width="10" height="13" rx="3"/>
        </g>
        <rect x="105" y="62" width="28" height="42" rx="4" fill="white" fill-opacity="0.18" stroke-width="1.5"/>
        <rect x="138" y="62" width="24" height="42" rx="4" fill="white" fill-opacity="0.18" stroke-width="1.5"/>
        <rect x="105" y="110" width="28" height="38" rx="4" fill="white" fill-opacity="0.18" stroke-width="1.5"/>
        <rect x="138" y="110" width="24" height="38" rx="4" fill="white" fill-opacity="0.18" stroke-width="1.5"/>
        <rect x="180" y="58" width="60" height="80" rx="6" fill="white" fill-opacity="0.15" stroke-width="2"/>
        <g fill="white" fill-opacity="0.6" stroke="none">
            <rect x="188" y="108" width="9" height="24" rx="2"/>
            <rect x="201" y="98"  width="9" height="34" rx="2"/>
            <rect x="214" y="103" width="9" height="29" rx="2"/>
            <rect x="227" y="90"  width="9" height="42" rx="2"/>
        </g>
        <line x1="186" y1="70" x2="234" y2="70" stroke-width="1.5" opacity="0.5"/>
        <line x1="186" y1="80" x2="220" y2="80" stroke-width="1.5" opacity="0.5"/>
        <circle cx="195" cy="152" r="6" fill="white" fill-opacity="0.3" stroke-width="1.5"/>
        <circle cx="215" cy="152" r="6" fill="white" fill-opacity="0.3" stroke-width="1.5"/>
        <circle cx="235" cy="152" r="6" fill="white" fill-opacity="0.3" stroke-width="1.5"/>
        <rect x="20" y="182" width="220" height="10" rx="5" fill="white" fill-opacity="0.25" stroke-width="1.5"/>
    </svg>

    <!-- NH4+ 입체 분자 구조 -->
    <svg class="nh4-mol" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="110" y1="110" x2="168" y2="52" stroke="white" stroke-width="2" stroke-dasharray="6 5"/>
        <line x1="110" y1="110" x2="110" y2="22" stroke="white" stroke-width="3"/>
        <line x1="110" y1="110" x2="28"  y2="168" stroke="white" stroke-width="3"/>
        <polygon points="110,110 186,178 192,164" fill="white"/>
        <circle cx="110" cy="18"  r="12" fill="white"/>
        <circle cx="24" cy="172" r="12" fill="white"/>
        <circle cx="194" cy="174" r="12" fill="white"/>
        <circle cx="172" cy="48" r="9" fill="white" opacity="0.6"/>
        <circle cx="110" cy="110" r="18" fill="white"/>
    </svg>

    <!-- 좌하단: 작은 시험관 -->
    <svg class="deco deco-bl" viewBox="0 0 140 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g transform="rotate(20, 70, 100)">
            <rect x="40" y="20" width="40" height="150" rx="20" fill="white"/>
            <rect x="40" y="100" width="40" height="50" rx="0" fill="white" opacity="0.4"/>
            <ellipse cx="60" cy="170" rx="20" ry="20" fill="white" opacity="0.4"/>
            <rect x="34" y="10" width="52" height="16" rx="4" fill="white" opacity="0.6"/>
        </g>
    </svg>

    <!-- H2O 물 분자 -->
    <svg class="h2o-mol" viewBox="0 0 160 140" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="80" y1="75" x2="24" y2="28" stroke="white" stroke-width="3.5"/>
        <line x1="80" y1="75" x2="136" y2="28" stroke="white" stroke-width="3.5"/>
        <circle cx="20" cy="24" r="9" fill="#1e3a5f"/>
        <circle cx="140" cy="24" r="9" fill="#1e3a5f"/>
        <circle cx="80" cy="78" r="22" fill="white"/>
    </svg>

    <div class="login-shell">
        <div class="login-card">
            <div class="login-hero">
                <div class="brand">
                    <div class="brand-badge">R</div>
                    <div>
                        <div class="fs-4">시약 관리 시스템</div>
                        <div class="text-secondary">로그인 후 이용해 주세요</div>
                    </div>
                </div>
                <p class="login-note mb-0">시약 재고 조회, 입출고, 이력 관리는 로그인 후 사용할 수 있습니다.</p>
            </div>
            <div class="login-body">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="post" action="/login/">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">아이디</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">비밀번호</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button type="submit" class="btn btn-login btn-lg w-100 text-white">로그인</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
